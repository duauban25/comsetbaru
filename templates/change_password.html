{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8 mt-10">
  <h2 class="text-2xl font-bold mb-6 text-center">Ubah Password</h2>
  <form method="POST" action="{{ url_for('change_password') }}" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password Saat Ini</label>
      <input type="password" name="current_password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Password saat ini">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password Baru</label>
      <input type="password" name="new_password" required minlength="6" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Minimal 6 karakter">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Password Baru</label>
      <input type="password" name="confirm_password" required minlength="6" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Ulangi password baru">
    </div>
    <div class="flex gap-3">
      <button type="submit" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium">Simpan</button>
      <a href="{{ url_for('profile') }}" class="flex-1 text-center py-3 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-lg font-medium">Batal</a>
    </div>
  </form>
</div>
{% endblock %}
