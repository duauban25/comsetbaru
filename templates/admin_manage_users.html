{% extends "base.html" %}
{% block content %}
<div class="max-w-5xl mx-auto p-6">
  <h1 class="text-2xl font-bold mb-6">Manage Users</h1>
  <div class="overflow-x-auto bg-white shadow rounded-lg">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nama</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tanggal Lahir</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Role</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Aktif</th>
          <th class="px-4 py-3"></th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        {% for u in users %}
        <tr>
          <td class="px-4 py-3 text-sm text-gray-900">{{ u.email }}</td>
          <td class="px-4 py-3 text-sm text-gray-700">{{ u.full_name or '-' }}</td>
          <td class="px-4 py-3 text-sm text-gray-700">{{ u.birth_date or '-' }}</td>
          <td class="px-4 py-3 text-sm">
            <form method="POST" action="{{ url_for('admin_manage_users') }}" class="flex items-center gap-2">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <input type="hidden" name="user_id" value="{{ u.id }}">
              <select name="role" class="px-2 py-1 border rounded">
                <option value="bronze" {% if u.role=='bronze' %}selected{% endif %}>Bronze</option>
                <option value="silver" {% if u.role=='silver' %}selected{% endif %}>Silver</option>
                <option value="gold" {% if u.role=='gold' %}selected{% endif %}>Gold</option>
                <option value="platinum" {% if u.role=='platinum' %}selected{% endif %}>Platinum</option>
                <option value="admin" {% if u.role=='admin' %}selected{% endif %}>Admin</option>
              </select>
              <label class="flex items-center gap-1 text-sm">
                <input type="checkbox" name="is_active" {% if u.is_active %}checked{% endif %}>
                Aktif
              </label>
              <button type="submit" class="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white rounded">Simpan</button>
            </form>
          </td>
          <td class="px-4 py-3 text-sm">{% if u.is_active %}<span class="text-green-700">Aktif</span>{% else %}<span class="text-gray-500">Nonaktif</span>{% endif %}</td>
          <td class="px-4 py-3 text-right text-sm">
            <!-- Placeholder for future actions (reset password, delete, etc.) -->
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
