{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8 mt-10">
  <h2 class="text-2xl font-bold mb-6 text-center">Buat Pengguna Baru</h2>
  <form method="POST" action="{{ url_for('admin_create_user') }}" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="user@example.com">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Role (ditetapkan oleh Admin berdasarkan request)</label>
      <select name="role" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        <option value="bronze">Bronze</option>
        <option value="silver">Silver</option>
        <option value="gold">Gold</option>
        <option value="platinum">Platinum</option>
        <option value="admin">Admin</option>
      </select>
      <p class="text-xs text-gray-500 mt-1">Hanya Admin berhak menetapkan status Bronze/Silver/Gold sesuai permintaan pengguna.</p>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password Sementara</label>
      <input type="password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Password sementara">
    </div>
    <button type="submit" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium">Buat User</button>
  </form>
</div>
{% endblock %}
