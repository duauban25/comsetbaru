{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8 mt-10">
  <h2 class="text-2xl font-bold mb-6 text-center">Admin: Analisa Nama</h2>
  <form method="POST" action="{{ url_for('admin_analyze') }}" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nama</label>
      <input type="text" name="name" value="{{ name or '' }}" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Nama untuk dianalisa">
    </div>
    <div>
      <label for="birth_date" class="block text-sm font-medium text-gray-700 mb-1">Tanggal Lahir</label>
      <input type="date" id="birth_date" name="birth_date" value="{{ birth_date or '' }}" required min="1900-01-01" max="2100-12-31" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <button type="submit" class="w-full py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-medium">Analisa</button>
  </form>
  <div class="mt-4 text-center">
    <p class="text-xs text-gray-500">Anda juga bisa akses langsung via URL query: /admin/analyze?name=Nama&birth_date=YYYY-MM-DD</p>
  </div>
</div>
{% endblock %}
