{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8 mt-10">
  <h2 class="text-2xl font-bold mb-6 text-center">Profil</h2>
  <form method="POST" action="{{ url_for('profile') }}" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
      <input type="text" name="full_name" value="{{ full_name }}" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Nama Lengkap">
    </div>
    <div>
      <label for="birth_date" class="block text-sm font-medium text-gray-700 mb-1">Tanggal Lahir</label>
      <input type="date" id="birth_date" name="birth_date" value="{{ birth_date }}" required min="1900-01-01" max="2100-12-31" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      <p class="text-xs text-gray-500 mt-1">Gunakan pemilih tanggal atau format YYYY-MM-DD, mis. 1990-04-21</p>
    </div>
    <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium">Simpan</button>
  </form>
</div>
{% endblock %}
