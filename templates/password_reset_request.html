{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8 mt-10">
  <h2 class="text-2xl font-bold mb-6 text-center">Reset Password</h2>
  <p class="text-sm text-gray-600 mb-4">Masukkan email Anda. Dalam mode pengembangan, link reset akan ditampilkan di layar dan konsol server.</p>
  <form method="POST" action="{{ url_for('password_reset_request') }}" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="you@example.com">
    </div>
    <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium">Kirim Link Reset</button>
  </form>
  <div class="mt-4 text-center">
    <a class="text-sm text-gray-600 hover:underline" href="{{ url_for('login') }}">Kembali ke Login</a>
  </div>
</div>
{% endblock %}
